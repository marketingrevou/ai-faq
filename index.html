<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temukan Workflow Automation Anda</title>
  <link rel="icon" type="image/png" href="/images/revou.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a73e8;
      --blue-light: #e8f0fe;
      --gray-100: #f1f3f4;
      --gray-200: #e8eaed;
      --gray-400: #bdc1c6;
      --gray-500: #9aa0a6;
      --gray-700: #5f6368;
      --gray-900: #202124;
      --red: #ea4335;
      --green: #34a853;
      --yellow: #fbbc04;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Red Hat Display', 'Segoe UI', Arial, sans-serif;
      background:
        linear-gradient(rgba(6, 147, 227, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 147, 227, 0.07) 1px, transparent 1px),
        radial-gradient(ellipse at 50% 45%, rgba(6, 147, 227, 0.22) 0%, #ffffff 68%);
      background-size: 52px 52px, 52px 52px, 100% 100%;
      background-attachment: fixed;
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 2rem 1rem;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      margin-bottom: 2rem;
    }

    /* ── SEARCH BAR ── */
    .search-area {
      width: 100%;
      max-width: 560px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      border: 1px solid rgba(6, 147, 227, 0.25);
      border-radius: 28px;
      box-shadow: 0 2px 12px rgba(6, 147, 227, 0.15), 0 1px 4px rgba(0,0,0,.08);
      padding: .85rem 1.4rem;
      gap: .75rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
    }

    .search-icon { color: var(--gray-500); flex-shrink: 0; }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      font-family: 'Red Hat Display', 'Segoe UI', Arial, sans-serif;
      color: var(--gray-900);
      background: transparent;
    }
    .search-input::placeholder { color: var(--gray-500); }
    .search-input:disabled { color: var(--gray-700); }

    .search-submit {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s;
    }
    .search-submit:hover:not(:disabled) { opacity: .85; }
    .search-submit:disabled { opacity: 0; pointer-events: none; }

    /* ── QUESTIONS FEED ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── ANSWERED ROW ── */
    .q-answered {
      display: flex;
      align-items: baseline;
      gap: .6rem;
      padding: .6rem 0;
      border-bottom: 1px solid var(--gray-200);
      animation: fadeIn .25s ease;
    }

    .q-answered .q-label {
      font-size: .82rem;
      color: var(--gray-500);
      flex-shrink: 0;
      min-width: 120px;
    }

    .q-answered .q-value {
      font-size: .9rem;
      color: var(--gray-900);
      font-weight: 500;
    }

    /* ── ACTIVE QUESTION ── */
    .q-active {
      padding: 1.5rem 0 .5rem;
      animation: slideUp .3s ease;
    }

    .q-active .q-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--gray-900);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .q-active .multi-hint {
      font-size: .78rem;
      color: var(--gray-500);
      margin-bottom: .75rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    .chip {
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      padding: .4rem .85rem;
      font-size: .88rem;
      cursor: pointer;
      transition: all .15s;
      background: #fff;
      color: var(--gray-900);
      user-select: none;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.selected {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 600;
    }

    .btn-confirm {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: .5rem 1.4rem;
      font-size: .88rem;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: .25rem;
    }
    .btn-confirm:disabled { opacity: .35; cursor: not-allowed; }
    .btn-confirm:not(:disabled):hover { opacity: .88; }

    /* ── LOADING ── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 1.5rem 0;
      animation: fadeIn .3s ease;
    }

    .dots {
      display: flex;
      gap: .35rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(1) { background: var(--blue);   animation-delay: 0s; }
    .dot:nth-child(2) { background: var(--red);    animation-delay: .2s; }
    .dot:nth-child(3) { background: var(--yellow); animation-delay: .4s; }
    .dot:nth-child(4) { background: var(--green);  animation-delay: .6s; }

    .loading-label {
      font-size: .9rem;
      color: var(--gray-700);
    }

    /* ── RESULTS ── */
    .results-section {
      width: 100%;
      max-width: 560px;
      margin-top: 1rem;
      animation: slideUp .35s ease;
    }

    .results-label {
      font-size: .78rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 1rem;
    }

    .workflow-card {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: .75rem;
      background: #fff;
      transition: box-shadow .2s;
    }
    .workflow-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .5rem;
      margin-bottom: .5rem;
    }

    .card-name {
      font-size: .98rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .badge {
      flex-shrink: 0;
      font-size: .7rem;
      font-weight: 600;
      border-radius: 4px;
      padding: .2rem .5rem;
      white-space: nowrap;
    }
    .badge-mudah    { background: #e6f4ea; color: #137333; }
    .badge-menengah { background: #fef7e0; color: #b06000; }
    .badge-lanjutan { background: #fce8e6; color: #c5221f; }

    .module-accordion { margin-top: .75rem; border-top: 1px solid var(--gray-200); }
    .module-accordion summary {
      cursor: pointer; list-style: none; font-size: .78rem; font-weight: 600;
      color: #6d28d9; padding: .55rem 0 .4rem; user-select: none;
    }
    .module-accordion summary::-webkit-details-marker { display: none; }
    .module-accordion summary::before { content: "▶ "; font-size: .65rem; }
    .module-accordion[open] summary::before { content: "▼ "; }
    .module-badges { display: flex; flex-wrap: wrap; gap: .35rem; padding: .35rem 0 .2rem; }
    .module-badge  { font-size: .7rem; font-weight: 600; padding: .2rem .55rem; border-radius: 999px;
                     background: #f3e8ff; color: #6d28d9; white-space: nowrap; }

    .card-desc {
      font-size: .86rem;
      color: var(--gray-700);
      line-height: 1.5;
      margin-bottom: .85rem;
    }

    .card-benefits {
      list-style: none;
      margin-bottom: .85rem;
    }
    .card-benefits li {
      font-size: .84rem;
      color: var(--gray-700);
      padding: .15rem 0;
      display: flex;
      gap: .4rem;
    }
    .card-benefits li::before { content: "✅"; flex-shrink: 0; }

    .card-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      color: var(--gray-700);
    }

    .tool-tag {
      background: var(--gray-100);
      border-radius: 4px;
      padding: .18rem .5rem;
      font-size: .76rem;
      color: var(--gray-700);
    }

    .error-box {
      background: #fce8e6;
      border: 1px solid #f28b82;
      border-radius: 8px;
      padding: 1rem;
      color: #c5221f;
      font-size: .88rem;
    }

    .restart-btn {
      display: inline-block;
      margin-top: 2rem;
      font-size: .85rem;
      color: var(--gray-500);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      background: none;
      border: none;
      padding: 0;
    }
    .restart-btn:hover { color: var(--gray-700); }

    /* ── GATE OVERLAY ── */
    #gate-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background:
        linear-gradient(rgba(6, 147, 227, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 147, 227, 0.07) 1px, transparent 1px),
        radial-gradient(ellipse at 50% 45%, rgba(6, 147, 227, 0.22) 0%, #ffffff 68%);
      background-size: 52px 52px, 52px 52px, 100% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 0.3s ease;
    }

    .gate-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(6, 147, 227, 0.2);
      border-radius: 16px;
      padding: 2rem 2rem 1.75rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(6, 147, 227, 0.12), 0 1px 6px rgba(0,0,0,0.08);
    }

    .gate-logo {
      height: 36px;
      width: auto;
      margin-bottom: 1.25rem;
      display: block;
    }

    .gate-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #05314A 0%, #0B74B0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .5rem;
    }

    .gate-subtitle {
      font-size: .88rem;
      color: var(--gray-700);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .gate-field { margin-bottom: 1rem; }

    .gate-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: .35rem;
    }
    .gate-label .required { color: var(--red); }
    .gate-label .optional { font-weight: 400; color: var(--gray-500); }

    .gate-input {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: .65rem .9rem;
      font-size: .9rem;
      font-family: 'Red Hat Display', 'Segoe UI', Arial, sans-serif;
      color: var(--gray-900);
      outline: none;
      transition: border-color .15s;
    }
    .gate-input:focus { border-color: var(--blue); }
    .gate-input::placeholder { color: var(--gray-400); }

    .gate-btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .75rem 1.25rem;
      font-size: .92rem;
      font-weight: 600;
      font-family: 'Red Hat Display', 'Segoe UI', Arial, sans-serif;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: .5rem;
    }
    .gate-btn:hover:not(:disabled) { opacity: .88; }
    .gate-btn:disabled { opacity: .5; cursor: not-allowed; }

    .gate-error {
      background: #fce8e6;
      border: 1px solid #f28b82;
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: .82rem;
      color: #c5221f;
      margin-bottom: .5rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.65); opacity: .5; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── TEXTAREA QUESTION ── */
    .q-textarea {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: .75rem 1rem;
      font-size: .88rem;
      font-family: 'Red Hat Display', 'Segoe UI', Arial, sans-serif;
      color: var(--gray-900);
      resize: vertical;
      min-height: 80px;
      margin-bottom: .75rem;
      transition: border-color .15s;
      outline: none;
    }
    .q-textarea:focus { border-color: var(--blue); }

    .btn-skip {
      background: none;
      border: none;
      font-size: .82rem;
      color: var(--gray-500);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-left: .75rem;
      padding: 0;
    }
    .btn-skip:hover { color: var(--gray-700); }

    /* ── CARD SCENARIO & STEPS ── */
    .card-scenario {
      background: #e8f0fe;
      border-left: 3px solid var(--blue);
      border-radius: 0 6px 6px 0;
      padding: .6rem .85rem;
      font-size: .84rem;
      color: var(--gray-700);
      font-style: italic;
      margin-bottom: .85rem;
      line-height: 1.5;
    }

    .card-steps {
      margin-bottom: .85rem;
    }
    .card-steps-label {
      font-size: .78rem;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .card-steps ol {
      padding-left: 1.2rem;
      margin: 0;
    }
    .card-steps li {
      font-size: .84rem;
      color: var(--gray-700);
      padding: .15rem 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="gate-overlay">
  <div class="gate-card">
    <img src="/images/trilogo.png" alt="RevoU" class="gate-logo" />
    <h2 class="gate-title">Workflow Automation Finder</h2>
    <p class="gate-subtitle">Isi form berikut untuk mendapatkan rekomendasi workflow automation yang dipersonalisasi untukmu.</p>
    <form id="lead-form" onsubmit="submitLead(event)">
      <div class="gate-field">
        <label class="gate-label">Nama Lengkap <span class="required">*</span></label>
        <input type="text" id="lead-nama" class="gate-input" required placeholder="Nama lengkap Anda" />
      </div>
      <div class="gate-field">
        <label class="gate-label">Email <span class="required">*</span></label>
        <input type="email" id="lead-email" class="gate-input" required placeholder="email@contoh.com" />
      </div>
      <div class="gate-field">
        <label class="gate-label">No. WhatsApp <span class="required">*</span></label>
        <input type="tel" id="lead-wa" class="gate-input" required placeholder="08xxxxxxxxxx" />
      </div>
      <div id="lead-error" class="gate-error" style="display:none;"></div>
      <button type="submit" class="gate-btn" id="lead-submit-btn">Mulai Eksplorasi →</button>
    </form>
  </div>
</div>

<div class="main" id="main-content" style="visibility:hidden;">
<div class="hero">
  <div>
    <img src="/images/trilogo.png" alt="RevoU x BINUS x GreatNusa" style="height: 40px; width: auto;" />
  </div>

  <h1 style="
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #05314A 0%, #0B74B0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin: 0;
  ">Workflow Automation Finder</h1>

  <div class="search-area">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="profesi-input" type="text"
             placeholder="Ketik profesi atau bidang usaha Anda..."
             oninput="document.getElementById('profesi-submit').disabled = !this.value.trim()"
             onkeydown="if(event.key==='Enter' && this.value.trim()) submitProfesi()" />
      <button class="search-submit" id="profesi-submit" onclick="submitProfesi()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="feed" style="width:100%;max-width:560px;"></div>
</div>

<script>
  // ── GATE LOGIC ──
  (function initGate() {
    // Capture utm_ops from URL and persist in sessionStorage
    const urlParams = new URLSearchParams(window.location.search);
    const utmOps = urlParams.get('utm_ops');
    if (utmOps) sessionStorage.setItem('utm_ops', utmOps);

    // Admin URL: set session and redirect to clean URL
    if (window.location.pathname === '/ac-932026') {
      sessionStorage.setItem('revou_access', 'admin');
      window.location.replace('/');
      return;
    }
    // Already authenticated: remove gate immediately (DOM is ready here)
    if (sessionStorage.getItem('revou_access')) {
      const overlay = document.getElementById('gate-overlay');
      if (overlay) overlay.remove();
      document.getElementById('main-content').style.visibility = '';
    }
  })();

  function removeGate() {
    const overlay = document.getElementById('gate-overlay');
    if (!overlay) return;
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.remove();
      document.getElementById('main-content').style.visibility = '';
    }, 300);
  }

  async function submitLead(event) {
    event.preventDefault();
    const nama  = document.getElementById('lead-nama').value.trim();
    const email = document.getElementById('lead-email').value.trim();
    const wa    = document.getElementById('lead-wa').value.trim();
    const errEl = document.getElementById('lead-error');
    const btn   = document.getElementById('lead-submit-btn');

    errEl.style.display = 'none';

    // Store lead data in sessionStorage — will be sent to Google Sheets
    // together with profesi once the user fills in the search bar
    sessionStorage.setItem('revou_access', 'user');
    sessionStorage.setItem('lead_nama',  nama);
    sessionStorage.setItem('lead_email', email);
    sessionStorage.setItem('lead_wa',    wa);
    removeGate();
  }

  const profesiToolsMap = {
    "HR & Rekrutmen":         ["WhatsApp", "Gmail / Outlook", "Google Sheets", "Notion", "Slack", "Trello / Asana", "Zoom / Google Meet", "LinkedIn", "BambooHR / Mekari", "Belum pakai tools khusus"],
    "Marketing & Iklan":      ["Instagram / Meta Ads", "Gmail", "Google Sheets", "Canva", "Mailchimp / Klaviyo", "Notion", "Google Analytics", "TikTok Ads", "Hootsuite / Buffer", "Belum pakai tools khusus"],
    "Sales & CRM":            ["WhatsApp", "Gmail / Outlook", "Google Sheets", "HubSpot / Salesforce", "Trello / Asana", "Zoom / Google Meet", "Notion", "LinkedIn", "Belum pakai tools khusus"],
    "Finance & Akuntansi":    ["Google Sheets / Excel", "Gmail", "Jurnal / Accurate / QuickBooks", "Xero", "Google Drive", "Notion", "Belum pakai tools khusus"],
    "Operasional":            ["WhatsApp", "Gmail", "Google Sheets", "Trello / Asana", "Notion", "Slack", "Zoom / Google Meet", "Belum pakai tools khusus"],
    "E-commerce":             ["WhatsApp", "Gmail", "Tokopedia / Shopee", "Google Sheets", "Instagram / Meta Ads", "Canva", "Lazada", "TikTok Shop", "Belum pakai tools khusus"],
    "Konsultan":              ["Gmail", "Google Sheets", "Notion", "Zoom / Google Meet", "Slack", "Trello / Asana", "LinkedIn", "Belum pakai tools khusus"],
    "Pendidikan":             ["Gmail", "Google Classroom", "Google Sheets", "Zoom / Google Meet", "WhatsApp", "Canva", "Notion", "Belum pakai tools khusus"],
    "Properti & Real Estate": ["WhatsApp", "Gmail", "Google Sheets", "Instagram / Meta Ads", "Canva", "Zoom / Google Meet", "Belum pakai tools khusus"],
    "Kesehatan & Klinik":     ["WhatsApp", "Gmail", "Google Sheets", "Google Forms", "Zoom / Google Meet", "Belum pakai tools khusus"],
    "Restoran & F&B":         ["WhatsApp", "Google Sheets", "Instagram / Meta Ads", "GoPay / OVO / Dana", "GoFood / GrabFood", "POS System", "Belum pakai tools khusus"],
    "Startup & Tech":         ["Gmail", "Slack", "Notion", "GitHub / GitLab", "Jira / Linear", "Google Sheets", "Airtable", "Figma", "Belum pakai tools khusus"],
    "Logistik & Pengiriman":  ["WhatsApp", "Gmail", "Google Sheets", "JNE / J&T / SiCepat", "Tokopedia / Shopee", "Belum pakai tools khusus"],
    "Event Organizer / EO":   ["WhatsApp", "Gmail", "Google Sheets", "Instagram / Meta Ads", "Canva", "Trello / Asana", "Zoom / Google Meet", "Belum pakai tools khusus"],
    "Hukum & Legal":          ["Gmail", "Google Docs", "Google Sheets", "Zoom / Google Meet", "Notion", "Belum pakai tools khusus"],
    "Lainnya":                ["WhatsApp / WhatsApp Business", "Gmail / Outlook", "Google Sheets / Excel", "Tokopedia / Shopee", "Instagram / Meta Ads", "Notion", "Trello / Asana", "Airtable", "Slack", "Belum pakai tools khusus"]
  };

  const profesiTantanganMap = {
    "HR & Rekrutmen":         ["Screening & seleksi CV manual", "Onboarding karyawan baru", "Rekap absensi & lembur", "Follow-up kandidat interview", "Membuat kontrak & dokumen HR", "Koordinasi jadwal interview"],
    "Marketing & Iklan":      ["Membuat & jadwalkan konten media sosial", "Rekap performa iklan & laporan", "Follow-up leads dari iklan", "Riset kompetitor & tren pasar", "Koordinasi konten dengan tim kreatif", "Analisis data kampanye"],
    "Sales & CRM":            ["Follow-up leads & prospek baru", "Rekap pipeline & laporan penjualan", "Input data ke CRM", "Koordinasi demo & meeting klien", "Membuat proposal & penawaran", "Track target & komisi tim"],
    "Finance & Akuntansi":    ["Input transaksi & rekonsiliasi", "Membuat laporan keuangan bulanan", "Rekap invoice & pembayaran", "Follow-up tagihan yang belum dibayar", "Audit & verifikasi data", "Pajak & pelaporan compliance"],
    "Operasional":            ["Koordinasi antar departemen", "Rekap laporan harian/mingguan", "Monitoring KPI & performa", "Kelola vendor & supplier", "SOP & dokumentasi proses", "Approval & eskalasi masalah"],
    "E-commerce":             ["Update stok & harga produk", "Balas pertanyaan & komplain pembeli", "Rekap pesanan & pengiriman", "Membuat konten produk & promo", "Laporan penjualan multi-platform", "Kelola retur & refund"],
    "Konsultan":              ["Membuat proposal & laporan klien", "Riset & analisis data", "Follow-up klien & jadwal meeting", "Tracking deliverable & deadline", "Membuat presentasi", "Invoicing & billing"],
    "Pendidikan":             ["Rekap nilai & progress siswa", "Komunikasi dengan orang tua/siswa", "Membuat materi & soal", "Jadwal pelajaran & ujian", "Laporan administrasi sekolah", "Absensi & kehadiran"],
    "Properti & Real Estate": ["Follow-up prospek & leads", "Jadwalkan kunjungan properti", "Rekap listing & komisi", "Membuat marketing material", "Update portofolio properti", "Koordinasi dengan buyer & seller"],
    "Kesehatan & Klinik":     ["Jadwal & konfirmasi appointment", "Rekap rekam medis pasien", "Follow-up hasil lab & tindak lanjut", "Laporan kunjungan & pendapatan", "Stok obat & alkes", "Komunikasi dengan pasien"],
    "Restoran & F&B":         ["Rekap pesanan & omzet harian", "Kelola stok bahan baku", "Balas review & feedback pelanggan", "Jadwal karyawan & shift", "Laporan ke platform delivery", "Promo & loyalty program"],
    "Startup & Tech":         ["Sprint planning & tracking", "Review kode & deployment", "Rekap bug & issue", "Komunikasi lintas tim", "Dokumentasi teknis", "Onboarding developer baru"],
    "Logistik & Pengiriman":  ["Track & update status pengiriman", "Rekap order & resi harian", "Koordinasi dengan kurir & driver", "Laporan keterlambatan & retur", "Kelola armada & jadwal", "Invoice & pembayaran klien"],
    "Event Organizer / EO":   ["Koordinasi vendor & venue", "Rekap budget & pengeluaran", "Follow-up klien & sponsor", "Buat rundown & timeline acara", "Koordinasi tim lapangan", "Post-event report & evaluasi"],
    "Hukum & Legal":          ["Draft & review kontrak", "Tracking deadline dokumen", "Follow-up klien & kasus", "Riset hukum & regulasi", "Laporan billing & jam kerja", "Arsip & manajemen dokumen"],
    "Lainnya":                ["Input data manual yang berulang", "Membuat laporan & rekap", "Follow-up customer / leads", "Kelola email & pesan masuk", "Koordinasi tim & task tracking", "Riset & pembuatan konten"]
  };

  const questions = [
    {
      id: "ukuran_tim",
      text: "Berapa besar tim atau bisnis Anda?",
      short: "Ukuran tim",
      multi: false,
      options: ["Solo / Freelancer", "Tim kecil (2–10 orang)", "Menengah (11–50 orang)", "Besar (>50 orang)"]
    },
    {
      id: "tantangan",
      text: "Apa tantangan terbesar Anda sehari-hari?",
      short: "Tantangan",
      multi: false,
      options: ["Input data manual yang berulang", "Membuat laporan & rekap", "Follow-up customer / leads", "Kelola email & pesan masuk", "Koordinasi tim & task tracking", "Riset & pembuatan konten"]
    },
    {
      id: "tools",
      text: "Tools apa yang sudah Anda gunakan?",
      short: "Tools",
      multi: true,
      options: ["WhatsApp / WhatsApp Business", "Gmail / Outlook", "Google Sheets / Excel", "Tokopedia / Shopee", "Instagram / Meta Ads", "Notion", "Trello / Asana", "Airtable", "Slack", "Belum pakai tools khusus"]
    },
    {
      id: "tech_level",
      text: "Seberapa nyaman Anda dengan teknologi?",
      short: "Level teknis",
      multi: false,
      options: ["Tidak teknis — butuh panduan langkah demi langkah", "Sedikit bisa — pernah pakai beberapa software", "Cukup familiar — bisa ikuti tutorial teknis", "Sangat teknis — bisa coding dan konfigurasi sendiri"]
    },
    {
      id: "keinginan",
      text: "Ada proses spesifik yang ingin Anda otomasi? (opsional)",
      short: "Ingin otomasi",
      type: "textarea",
      placeholder: "Contoh: setiap hari saya harus copy-paste data dari email ke spreadsheet..."
    }
  ];

  const answers = {};
  let currentStep = 0;
  const feed = document.getElementById("feed");

  function getProfesiKey(text) {
    if (!text) return "Lainnya";
    const t = text.toLowerCase();
    if (/\bhr\b|hrd|rekrut|human resource|sdm|personalia/.test(t))          return "HR & Rekrutmen";
    if (/marketing|iklan|\bads\b|brand|promosi|digital marketing/.test(t))  return "Marketing & Iklan";
    if (/\bsales\b|\bcrm\b|penjualan|jualan|account executive/.test(t))     return "Sales & CRM";
    if (/finance|akuntansi|keuangan|akuntan|accounting|pajak|cfo/.test(t))  return "Finance & Akuntansi";
    if (/operasional|operation|\bops\b|supply chain/.test(t))               return "Operasional";
    if (/ecommerce|e-commerce|online shop|toko online|shopee|tokopedia/.test(t)) return "E-commerce";
    if (/konsultan|consulting|konsultasi|advisor/.test(t))                  return "Konsultan";
    if (/pendidikan|guru|dosen|teacher|sekolah|kampus|tutor|edukasi/.test(t)) return "Pendidikan";
    if (/properti|real estate|agen properti|developer|perumahan/.test(t))   return "Properti & Real Estate";
    if (/kesehatan|dokter|klinik|rumah sakit|apoteker|perawat|medis/.test(t)) return "Kesehatan & Klinik";
    if (/restoran|fnb|f&b|cafe|kafe|kuliner|makanan|minuman|warung/.test(t)) return "Restoran & F&B";
    if (/startup|tech|\bit\b|teknologi|programmer|developer|software|engineer/.test(t)) return "Startup & Tech";
    if (/logistik|pengiriman|ekspedisi|kurir|warehouse|gudang|cargo/.test(t)) return "Logistik & Pengiriman";
    if (/event|organizer|\beo\b|acara|wedding|konser|exhibition/.test(t))   return "Event Organizer / EO";
    if (/hukum|legal|pengacara|lawyer|notaris|advokat/.test(t))             return "Hukum & Legal";
    return "Lainnya";
  }

  function submitProfesi() {
    const input = document.getElementById("profesi-input");
    const val = input.value.trim();
    if (!val) return;
    answers.profesi = val;
    input.disabled = true;
    document.getElementById("profesi-submit").disabled = true;

    // Send complete lead row to Google Sheets (only for user access, not admin)
    if (sessionStorage.getItem('revou_access') === 'user') {
      fetch('/submit-lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nama:    sessionStorage.getItem('lead_nama')  || '',
          email:   sessionStorage.getItem('lead_email') || '',
          wa:      sessionStorage.getItem('lead_wa')    || '',
          profesi: val,
          utm_ops: sessionStorage.getItem('utm_ops')    || '',
        })
      }).then(r => r.json()).then(d => { if (d.sheet_error) console.warn('[submit-lead] sheet error:', d.sheet_error); }).catch(console.error);
    }

    appendActiveQuestion(0);
  }

  function getOptionsForQuestion(q) {
    const key = getProfesiKey(answers.profesi);
    if (q.id === "tantangan") return profesiTantanganMap[key] || q.options;
    if (q.id === "tools")     return profesiToolsMap[key]     || q.options;
    return q.options;
  }

  function appendActiveQuestion(idx) {
    const q = questions[idx];
    if (q.type === "textarea") { appendTextareaQuestion(idx); return; }

    const block = document.createElement("div");
    block.className = "q-active";
    block.id = `q-active-${idx}`;

    block.innerHTML = `
      <p class="q-text">${q.text}</p>
      ${q.multi ? '<p class="multi-hint">Pilih semua yang sesuai</p>' : ""}
      <div class="chips" id="chips-${idx}">
        ${getOptionsForQuestion(q).map(opt => `
          <div class="chip" data-val="${esc(opt)}"
               onclick="pickChip(${idx}, this, ${q.multi})">
            ${opt}
          </div>`).join("")}
      </div>
      ${q.multi ? `<button class="btn-confirm" id="confirm-${idx}" disabled
                           onclick="confirmMulti(${idx})">Lanjut →</button>` : ""}
    `;

    feed.appendChild(block);
    block.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function appendTextareaQuestion(idx) {
    const q = questions[idx];
    const block = document.createElement("div");
    block.className = "q-active";
    block.id = `q-active-${idx}`;

    block.innerHTML = `
      <p class="q-text">${q.text}</p>
      <textarea class="q-textarea" id="textarea-${idx}" placeholder="${q.placeholder || ""}"></textarea>
      <div>
        <button class="btn-confirm" onclick="confirmTextarea(${idx})">Lanjut →</button>
        <button class="btn-skip" onclick="skipTextarea(${idx})">Lewati</button>
      </div>
    `;

    feed.appendChild(block);
    block.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function confirmTextarea(idx) {
    const q = questions[idx];
    const val = document.getElementById(`textarea-${idx}`).value.trim();
    answers[q.id] = val;
    advanceFrom(idx);
  }

  function skipTextarea(idx) {
    const q = questions[idx];
    answers[q.id] = "";
    advanceFrom(idx);
  }

  function esc(s) {
    return s.replace(/"/g, "&quot;").replace(/'/g, "\\'");
  }

  function pickChip(idx, el, multi) {
    const q = questions[idx];

    if (multi) {
      el.classList.toggle("selected");
      answers[q.id] = [...document.querySelectorAll(`#chips-${idx} .chip.selected`)]
        .map(c => c.dataset.val);
      const btn = document.getElementById(`confirm-${idx}`);
      btn.disabled = answers[q.id].length === 0;
    } else {
      answers[q.id] = [el.dataset.val];
      advanceFrom(idx);
    }
  }

  function confirmMulti(idx) {
    const q = questions[idx];
    if (!answers[q.id] || answers[q.id].length === 0) return;
    advanceFrom(idx);
  }

  function advanceFrom(idx) {
    const q = questions[idx];
    const block = document.getElementById(`q-active-${idx}`);

    // Replace active block with answered row
    const row = document.createElement("div");
    row.className = "q-answered";
    const displayValue = Array.isArray(answers[q.id])
      ? answers[q.id].join(", ")
      : (answers[q.id] || "Dilewati");
    row.innerHTML = `
      <span class="q-label">${q.short}</span>
      <span class="q-value">${displayValue}</span>
    `;
    feed.replaceChild(row, block);

    currentStep = idx + 1;

    if (currentStep < questions.length) {
      appendActiveQuestion(currentStep);
    } else {
      appendSubmit();
    }
  }

  function appendSubmit() {
    // Auto-submit immediately after last answer
    appendLoading();
    submitProfile();
  }

  function appendLoading() {
    const el = document.createElement("div");
    el.className = "loading-row";
    el.id = "loading-row";
    el.innerHTML = `
      <div class="dots">
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
      <span class="loading-label">Sedang mencari workflow terbaik untuk Anda...</span>
    `;
    feed.appendChild(el);
    el.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  async function submitProfile() {
    const flatAnswers = {};
    Object.entries(answers).forEach(([k, v]) => {
      flatAnswers[k] = Array.isArray(v) ? v.join(", ") : v;
    });

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ answers: flatAnswers })
      });

      const data = await res.json();
      document.getElementById("loading-row")?.remove();

      if (!res.ok) throw new Error(data.error || "Gagal mendapatkan rekomendasi");
      renderResults(data.workflows);
    } catch (err) {
      document.getElementById("loading-row")?.remove();
      renderError(err.message);
    }
  }

  function renderResults(workflows) {
    const section = document.createElement("div");
    section.className = "results-section";

    if (!workflows || workflows.length === 0) {
      section.innerHTML = `<div class="error-box">Tidak ada workflow ditemukan. Silakan coba lagi.</div>`;
      feed.appendChild(section);
      return;
    }

    const badgeMap = { "Mudah": "badge-mudah", "Menengah": "badge-menengah", "Lanjutan": "badge-lanjutan" };
    const MODULES = {
      1: "AI Literacy",
      2: "Business Analytics",
      3: "Data Foundations",
      4: "Data Visualization",
      5: "Prompt Engineering",
      6: "Custom AI Assistants",
      7: "Workflow Automation (n8n)",
      8: "AI-Enhanced Automation",
      9: "Agentic AI",
    };

    section.innerHTML = `
      <p class="results-label">Rekomendasi workflow untuk Anda</p>
      ${workflows.map(w => `
        <div class="workflow-card">
          <div class="card-top">
            <div class="card-name">${w.nama}</div>
            <span class="badge ${badgeMap[w.tingkat_kesulitan] || "badge-menengah"}">${w.tingkat_kesulitan}</span>
          </div>
          ${w.contoh_skenario ? `<div class="card-scenario">${w.contoh_skenario}</div>` : ""}
          <p class="card-desc">${w.deskripsi}</p>
          <ul class="card-benefits">
            ${(w.manfaat || []).map(b => `<li>${b}</li>`).join("")}
          </ul>
          ${w.langkah_awal?.length ? `
          <div class="card-steps">
            <div class="card-steps-label">Mulai dari sini</div>
            <ol>${w.langkah_awal.map(s => `<li>${s}</li>`).join("")}</ol>
          </div>` : ""}
          <div class="card-footer">
            <span>⏰ Time Saved: ${w.estimasi_waktu_hemat}</span>
            ${(w.tools_dibutuhkan || []).map(t => `<span class="tool-tag">${t}</span>`).join("")}
          </div>
          ${(w.modul_terkait?.length)
            ? `<details class="module-accordion">
                 <summary>Related Module</summary>
                 <div class="module-badges">
                   ${w.modul_terkait.map(n => MODULES[n]
                     ? `<span class="module-badge">W${n} · ${MODULES[n]}</span>`
                     : "").join("")}
                 </div>
               </details>`
            : ""}
        </div>`).join("")}
      <button class="restart-btn" onclick="location.reload()">↺ Mulai ulang dengan profil berbeda</button>
    `;

    feed.appendChild(section);
    section.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function renderError(msg) {
    const section = document.createElement("div");
    section.className = "results-section";
    section.innerHTML = `
      <div class="error-box">
        <strong>Terjadi kesalahan:</strong><br>${msg}
      </div>
      <button class="restart-btn" onclick="location.reload()">↺ Coba lagi</button>
    `;
    feed.appendChild(section);
    section.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
</script>

  width: 100%;
  text-align: center;

  border-top: 1px solid rgba(6, 147, 227, 0.1);
">

</footer>
